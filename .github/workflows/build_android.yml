# Automated Android APK Build
name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - developer
      - develop
  workflow_dispatch: # Permite compilar manualmente con un clic desde el panel de GitHub

jobs:
  build:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Reconstruir los archivos .env de forma segura en la nube usando Secrets
      - name: Create .env and .env.dev files
        run: |
          echo "${{ secrets.ENV_PROD }}" > .env
          echo "${{ secrets.ENV_PROD }}" > .env.dev

      # 2. Configurar Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configurar el SDK de Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Instalar dependencias
      - name: Install dependencies
        run: |
          flutter pub get

      # 5. Compilar el APK de Android
      - name: Build Android APK
        run: |
          flutter build apk --release --flavor prod

      # 6. Subir el APK resultante como un artefacto descargable
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-release-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 7
