name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
      - developer
      - develop
  workflow_dispatch: # Permite compilar manualmente con un clic desde el panel de GitHub

jobs:
  build:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Reconstruir los archivos .env de forma segura en la nube usando Secrets
      - name: Create .env and .env.dev files
        run: |
          echo "${{ secrets.ENV_PROD }}" > .env
          echo "${{ secrets.ENV_PROD }}" > .env.dev

      # 2. Configurar el SDK de Flutter en el servidor macOS de GitHub
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Instalar dependencias de Flutter
      - name: Install dependencies
        run: |
          flutter pub get

      # 4. Compilar la aplicación para iOS (Sin firma para evitar bloqueos de Apple)
      - name: Build iOS App (No Codesign)
        run: |
          flutter build ios --no-codesign --release

      # 5. Empaquetar el bundle compilado en un archivo .ipa unsigned
      - name: Package into Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-properties-unsigned.ipa Payload
          rm -rf Payload

      # 6. Subir el archivo .ipa resultante como un artefacto descargable de la compilación
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-properties-unsigned-ipa
          path: app-properties-unsigned.ipa
          retention-days: 7
